<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in to Inner Map</title>
<!--
  Magic-link fallback page (build-13 email-sign-in fix).
  =====================================================
  The email's clickable URL is https://my-inner-map.com/auth/email?token=…
  When the user taps that link, ONE of these happens:

    1. iOS Universal Link / Android App Link intercepts the URL silently
       before the browser renders this page. Inner Map opens directly
       with the token in its deep-link handler, signs the user in.
       This is the happy path. Requires /.well-known/apple-app-site-
       association (iOS) + /.well-known/assetlinks.json (Android) with
       the production app's Team ID + signing-cert fingerprint
       respectively. Until those files are populated (placeholders
       below in this repo), Universal Links won't trigger and we
       always fall through to case 2.

    2. The browser opens this page. JavaScript below:
         a. extracts the ?token=… query param
         b. immediately attempts a redirect to innermap://auth/email
            ?token=… — the custom-scheme deep link the native app
            registers. If the app is installed, iOS / Android open
            it; the deep-link handler in app/_layout.tsx grabs the
            token and runs api.authSignIn('email', token).
         c. shows a manual "Open Inner Map" button so the user can
            retry if the auto-redirect didn't fire (some email
            clients block top-level navigation to custom schemes,
            but allow user-initiated clicks).
         d. shows a graceful fallback message if no token at all
            (URL was malformed / link was edited).

  The custom-scheme branch (case 2b/c) WORKS WITHOUT the .well-known
  files. That's what unblocks email sign-in today. Universal Links
  upgrade the UX from "browser opens, page redirects, app launches"
  to "tap link, app opens directly" — desirable but not required.
-->
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    background: #0a0a0f;
    color: #F0EDE8;
    line-height: 1.55;
  }
  .card {
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  h1 {
    color: #E6B47A;
    font-size: 24px;
    font-weight: 600;
    margin: 0 0 12px;
    letter-spacing: 0.2px;
  }
  p { margin: 12px 0; opacity: 0.85; }
  .btn {
    display: inline-block;
    background: #E6B47A;
    color: #0a0a0f;
    font-weight: 600;
    font-size: 15px;
    padding: 14px 32px;
    border-radius: 999px;
    text-decoration: none;
    letter-spacing: 0.3px;
    margin-top: 24px;
    transition: opacity 0.15s ease;
  }
  .btn:hover { opacity: 0.9; }
  .btn[hidden] { display: none; }
  .small { font-size: 13px; opacity: 0.55; margin-top: 32px; }
  .err {
    color: #E05050;
    margin-top: 20px;
    font-size: 14px;
  }
  /* Spinner shown while we auto-redirect — gives the user a beat of
     "something is happening" instead of a blank flash. */
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(230,180,122,0.25);
    border-top-color: #E6B47A;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>Sign in to Inner Map</h1>
  <p id="status">
    <span class="spinner" id="spinner"></span><span id="status-text">Opening Inner Map…</span>
  </p>
  <a class="btn" id="open-btn" href="#" hidden>Open Inner Map</a>
  <p class="small" id="hint" hidden>
    If the app didn't open automatically, make sure Inner Map is installed on this device,
    then tap the button above.
  </p>
  <p class="err" id="err" hidden></p>
</div>
<script>
(function () {
  // Extract token from query string. Defensive — search-params API is
  // universal but we still null-guard for very old WebViews opened
  // out of an email client preview pane.
  var qs = (typeof URLSearchParams !== 'undefined')
    ? new URLSearchParams(window.location.search)
    : null;
  var token = qs ? (qs.get('token') || '').trim() : '';

  var statusText = document.getElementById('status-text');
  var spinner    = document.getElementById('spinner');
  var openBtn    = document.getElementById('open-btn');
  var hint       = document.getElementById('hint');
  var err        = document.getElementById('err');

  if (!token) {
    spinner.style.display = 'none';
    statusText.textContent = 'This sign-in link is missing its token.';
    err.hidden = false;
    err.textContent = 'Please request a fresh sign-in email from the app.';
    return;
  }

  // Custom-scheme deep link. The native app's intent filter for
  // scheme="innermap" + host="auth" routes this to the deep-link
  // handler in app/_layout.tsx (consumeAuthEmailUrl). The token
  // is consumed there.
  var deepLink = 'innermap://auth/email?token=' + encodeURIComponent(token);

  // Wire the manual button immediately so user-initiated taps work
  // even when auto-redirect is blocked.
  openBtn.href = deepLink;
  openBtn.hidden = false;
  hint.hidden = false;

  // Attempt auto-redirect. Most mobile browsers + in-app browsers
  // honor a top-level navigation to a custom scheme, but some email
  // clients (Gmail in-app, certain Outlook flows) block it. The
  // manual button above is the fallback when this no-ops silently.
  // We use location.href rather than window.open because the latter
  // is more aggressively popup-blocked on mobile.
  setTimeout(function () {
    try {
      window.location.href = deepLink;
    } catch (e) {
      // Some browsers throw when custom-scheme navigation fails.
      // Surface the manual-button copy in that case.
      spinner.style.display = 'none';
      statusText.textContent = 'Tap below to finish signing in.';
    }
    // After a short delay, if we're still on this page (didn't
    // navigate away into the app), surface the manual-tap copy.
    // This is the "app not installed" or "scheme blocked" branch.
    setTimeout(function () {
      if (!document.hidden) {
        spinner.style.display = 'none';
        statusText.textContent = 'Tap below to finish signing in.';
      }
    }, 1500);
  }, 50);
})();
</script>
</body>
</html>
